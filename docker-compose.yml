services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: template_django_apps
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Anhvu92@1
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d template_django_apps"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "6379:6379"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./config/.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      DEBUG: "True"
      ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0"
      DB_NAME: template_django_apps
      DB_USER: postgres
      DB_PASSWORD: Anhvu92@1
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_URL: redis://redis:6379/1
      GUNICORN_BIND: 0.0.0.0:8000
      GUNICORN_WORKERS: "2"
      GUNICORN_THREADS: "4"
      BACKUP_DISPLAY_PATH: "${PWD}/volumes/backup"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - 8000:8000
    volumes:
      - ./media:/app/media
      - ./volumes/backup:/app/backup-history
      - ./volumes/backup-trigger:/app/backup-trigger
